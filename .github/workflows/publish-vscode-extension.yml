name: Publish VS Code Extension

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "resources/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tsconfig.test.json"
      - "esbuild.js"
      - ".vscodeignore"
      - ".github/workflows/publish-vscode-extension.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: vscode
    env:
      NODE_VERSION: "22"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: version_bump
        run: |
          before_version="$(node -e "console.log(require('./package.json').version)")"
          npm version patch --no-git-tag-version
          after_version="$(node -e "console.log(require('./package.json').version)")"

          echo "before_version=${before_version}" >> "$GITHUB_OUTPUT"
          echo "after_version=${after_version}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump extension version to v${{ steps.version_bump.outputs.after_version }}"
          git push origin HEAD:main

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --pat "$VSCE_PAT"
